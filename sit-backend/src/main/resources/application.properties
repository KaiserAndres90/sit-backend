server.port=${PORT:8080}
# PostgreSQL local: usuario postgres, clave por defecto 1234 (sobreescribir con DB_PASSWORD en produccion)
# Sin PostgreSQL: perfil dev (H2). ejecutar-backend-dev.bat o SPRING_PROFILES_ACTIVE=dev
spring.datasource.url=jdbc:postgresql://localhost:5432/sit_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=${JWT_SECRET:claveSecretaSuperSeguraParaDesarrollo2025}
jwt.expiration=86400000
logging.level.org.springframework.security=DEBUG
logging.level.com.sit=DEBUG
